<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<h2>IoT Dashboard</h2>

<p>Temperature: <span id="temp">--</span></p>
<p>Humidity: <span id="hum">--</span></p>
<p>CO2: <span id="co2">--</span></p>

<canvas id="chart"></canvas>

<script>

var firebaseConfig = {
  databaseURL: "PASTE_YOUR_URL_HERE"
};

firebase.initializeApp(firebaseConfig);

var ref = firebase.database().ref("sensor_data");

var labels = [];
var tempData = [];

var chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Temperature',
      data: tempData
    }]
  }
});

ref.limitToLast(10).on("value", function(snapshot) {
  var data = snapshot.val();

  labels.length = 0;
  tempData.length = 0;

  for (var key in data) {
    labels.push(key);
    tempData.push(data[key].temperature);
  }

  var lastKey = Object.keys(data).pop();

  document.getElementById("temp").innerText = data[lastKey].temperature;
  document.getElementById("hum").innerText = data[lastKey].humidity;
  document.getElementById("co2").innerText = data[lastKey].co2;

  chart.update();
});

</script>

</body>
</html>
